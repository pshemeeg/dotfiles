# Prefix — Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Indeksowanie od 1 zamiast 0 (łatwiej dosięgnąć na klawiaturze)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Mysz
set -g mouse on

# Kolory
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Vim-style poruszanie między panelami
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Podział okien — bardziej intuicyjne skróty
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Nowe okno w aktualnym katalogu
bind c new-window -c "#{pane_current_path}"

# Przeładuj konfigurację
bind r source-file ~/.config/tmux/tmux.conf \; display "Przeładowano!"

# Szybsze reakcje
set -sg escape-time 0
set -g repeat-time 300

# Historia
set -g history-limit 10000

# Status bar
set -g status-position bottom
set -g status-style "bg=#111A18,fg=#00E5C8"
set -g status-left "#[fg=#00E5C8,bold] #S "
set -g status-right "#[fg=#7AB5AD] %H:%M #[fg=#00E5C8]%d.%m.%Y "
set -g window-status-format "#[fg=#7AB5AD] #I:#W "
set -g window-status-current-format "#[fg=#00E5C8,bold] #I:#W "
set -g pane-border-style "fg=#1A2B27"
set -g pane-active-border-style "fg=#00E5C8"
set -g message-style "bg=#1A2B27,fg=#00E5C8"
