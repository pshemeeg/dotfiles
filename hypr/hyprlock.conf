general {
    hide_cursor = true
}

background {
    monitor =
    path = /home/pshemeeg/Obrazy/tapeta.png
    blur_passes = 2
    blur_size = 7
    brightness = 0.6
}

input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.2
    outer_color = rgba(00E5C8ff)
    inner_color = rgba(0A0F0Ecc)
    font_color = rgb(D0ECE8)
    fade_on_empty = true
    placeholder_text = <span foreground="##7AB5AD">hasło...</span>
    check_color = rgba(00E5C8ff)
    fail_color = rgba(ff6b6bff)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(00E5C8ff)
    font_size = 72
    font_family = FiraCode Nerd Font
    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(D0ECEEff)
    font_size = 18
    font_family = FiraCode Nerd Font
    position = 0, 20
    halign = center
    valign = center
}
